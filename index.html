<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>PvP Filter Gen v17</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background: #121212; color: #eee; }
        .container { max-width: 900px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        .flex { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .options-row { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        button { flex: 1; padding: 15px; cursor: pointer; border-radius: 6px; font-weight: bold; border: none; }
        .btn-add { background: #2980b9; color: white; }
        .btn-download { background: #27ae60; color: white; margin-top: 10px; }
        .btn-clear { background: #c0392b; color: white; max-width: 150px; margin-top: 10px; }
        pre { background: #000; color: #00ff00; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 11px; max-height: 250px; }
        .queue-box { background: #111; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px dashed #444; }
        .queue-item { display: inline-block; background: #333; padding: 5px 10px; margin: 5px; border-radius: 4px; font-size: 13px; border-left: 3px solid #27ae60; }
        label { font-size: 14px; cursor: pointer; user-select: none; color: #bbb; }
        .highlight { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>PvP Filter Generator v17</h2>
    <div id="status" style="text-align:center; color: #27ae60; margin-bottom:10px;">Laddar Game Master...</div>
    
    <input type="text" id="pkmInput" placeholder="Sök Pokémon (t.ex. Venusaur)..." list="pkmList">
    <datalist id="pkmList"></datalist>

    <div class="options-row">
        <div class="flex">
            <select id="league">
                <option value="1500">Great League (1500)</option>
                <option value="2500">Ultra League (2500)</option>
            </select>
            <select id="rankCount">
                <option value="1">Rank 1</option>
                <option value="5" selected>Rank 1-5</option>
                <option value="10">Rank 1-10</option>
            </select>
        </div>
        
        <div class="flex" style="justify-content: space-around; background: #1a1a1a; padding: 10px; border-radius: 6px;">
            <label title="Om avbockad fångas endast bas-formen (t.ex. Bulbasaur)">
                <input type="checkbox" id="addEvolutions"> Inkludera även utvecklingar (familjen)
            </label>
            <label>
                <input type="checkbox" id="isShiny" checked> Only Shiny
            </label>
        </div>
        
        <button class="btn-add" id="addBtn" onclick="addToQueue()" disabled>+ Lägg till filter</button>
    </div>

    <div class="queue-box">
        <strong>Filter i kön:</strong>
        <div id="queueList"><i>Inga tillagda...</i></div>
    </div>

    <div class="flex">
        <button class="btn-download" id="dlBtn" onclick="downloadJson()" disabled>Generera & Spara .json</button>
        <button class="btn-clear" onclick="clearQueue()">Rensa kö</button>
    </div>

    <pre id="output">// JSON preview visas här...</pre>
</div>

<script>
const CPM = {1:0.094,1.5:0.13513743,2:0.16639787,2.5:0.19265092,3:0.21573247,3.5:0.23657266,4:0.25572005,4.5:0.27353038,5:0.29024988,5.5:0.30605737,6:0.3210876,6.5:0.33544501,7:0.34921903,7.5:0.36248612,8:0.37523559,8.5:0.38753336,9:0.39940354,9.5:0.41088741,10:0.42250001,10.5:0.43292641,11:0.44310755,11.5:0.45305995,12:0.46279839,12.5:0.47233608,13:0.48168495,13.5:0.4908558,14:0.49985844,14.5:0.50870178,15:0.51739395,15.5:0.52594251,16:0.53435433,16.5:0.54263576,17:0.55079269,17.5:0.55883057,18:0.56675452,18.5:0.57456915,19:0.58227891,19.5:0.5898879,20:0.59740001,20.5:0.60481881,21:0.61215731,21.5:0.61940412,22:0.62656713,22.5:0.63364917,23:0.64065295,23.5:0.64758097,24:0.65444234,24.5:0.6612148,25:0.667934,25.5:0.6746042,26:0.68121313,26.5:0.6877694,27:0.69427237,27.5:0.70072386,28:0.7071249,28.5:0.71347725,29:0.71978236,29.5:0.72604155,30:0.7317,30.5:0.734741,31:0.73776948,31.5:0.74078557,32:0.74378943,32.5:0.74678121,33:0.74976104,33.5:0.75272908,34:0.75568551,34.5:0.75863037,35:0.76156384,35.5:0.76448606,36:0.76739717,36.5:0.77029727,37:0.7731865,37.5:0.77606498,38:0.77892748,38.5:0.78177373,39:0.78460312,39.5:0.78741585,40:0.7903,40.5:0.7928,41:0.7953,41.5:0.7978,42:0.8003,42.5:0.8028,43:0.8053,43.5:0.8078,44:0.8103,44.5:0.8128,45:0.8153,45.5:0.8178,46:0.8203,46.5:0.8228,47:0.8253,47.5:0.8278,48:0.8303,48.5:0.8328,49:0.8353,49.5:0.8378,50:0.8403};
let pokemonData = [];
let queue = [];

async function init() {
    try {
        const res = await fetch('https://raw.githubusercontent.com/pvpoke/pvpoke/master/src/data/gamemaster.json');
        const data = await res.json();
        pokemonData = data.pokemon;
        const list = document.getElementById('pkmList');
        pokemonData.forEach(p => {
            let opt = document.createElement('option');
            opt.value = p.speciesName;
            list.appendChild(opt);
        });
        document.getElementById('status').innerText = "DATA LADDA ✔️";
        document.getElementById('addBtn').disabled = false;
    } catch (e) { document.getElementById('status').innerText = "FEL!"; }
}

function addToQueue() {
    const inputName = document.getElementById('pkmInput').value.trim();
    const league = parseInt(document.getElementById('league').value);
    const count = parseInt(document.getElementById('rankCount').value);
    const includeEvolutions = document.getElementById('addEvolutions').checked;
    const isShiny = document.getElementById('isShiny').checked;
    
    const targetPkm = pokemonData.find(x => x.speciesName.toLowerCase() === inputName.toLowerCase());
    if (!targetPkm) return alert("Hittade inte Pokémon!");

    // Logik för att hitta bas-formen
    let ids = [493];
    let familyMembers = [];
    if (targetPkm.family && targetPkm.family.id) {
        familyMembers = pokemonData.filter(x => x.family && x.family.id === targetPkm.family.id);
        familyMembers.sort((a, b) => a.dex - b.dex);
    }

    if (familyMembers.length > 0) {
        // Lägg alltid till den första (bas-formen, t.ex. Bulbasaur)
        ids.push(familyMembers[0].dex);
        
        // Om användaren vill ha med resten (Ivysaur/Venusaur)
        if (includeEvolutions) {
            familyMembers.forEach(m => {
                if(!ids.includes(m.dex)) ids.push(m.dex);
            });
        }
    } else {
        ids.push(targetPkm.dex);
    }

    // PvP Beräkning (Matematik från v14/v16)
    const bAtk = targetPkm.baseStats.atk, bDef = targetPkm.baseStats.def, bSta = targetPkm.baseStats.sta || targetPkm.baseStats.hp;
    let combinations = [];
    for (let a = 0; a <= 15; a++) {
        for (let d = 0; d <= 15; d++) {
            for (let s = 0; s <= 15; s++) {
                let bestLvl = 1;
                for (let l = 1; l <= 50; l += 0.5) {
                    let cp = Math.floor((bAtk+a) * Math.sqrt(bDef+d) * Math.sqrt(bSta+s) * Math.pow(CPM[l],2) / 10);
                    if (cp > league) break;
                    bestLvl = l;
                }
                let cpm = CPM[bestLvl];
                let statProd = ((bAtk+a)*cpm) * ((bDef+d)*cpm) * Math.floor((bSta+s)*cpm);
                combinations.push({ a, d, s, prod: statProd, lvl: bestLvl });
            }
        }
    }
    combinations.sort((x, y) => y.prod - x.prod);
    const top = combinations.slice(0, count);

    queue.push({
        name: targetPkm.speciesName,
        league: league,
        ids: ids,
        ivs: top,
        isShiny: isShiny,
        lvlMax: Math.floor(Math.max(...top.map(r => r.lvl)))
    });

    updateQueueUI();
    document.getElementById('pkmInput').value = "";
    document.getElementById('dlBtn').disabled = false;
}

function updateQueueUI() {
    const container = document.getElementById('queueList');
    if (queue.length === 0) {
        container.innerHTML = "<i>Inga tillagda...</i>";
        return;
    }
    container.innerHTML = queue.map((item, index) => `
        <span class="queue-item">${item.name} (${item.league}) ${item.isShiny ? '✨' : ''} <b style="cursor:pointer;color:#e74c3c;margin-left:5px" onclick="removeItem(${index})">×</b></span>
    `).join('');
}

function removeItem(index) {
    queue.splice(index, 1);
    updateQueueUI();
    if(queue.length === 0) document.getElementById('dlBtn').disabled = true;
}

function clearQueue() {
    queue = [];
    updateQueueUI();
    document.getElementById('dlBtn').disabled = true;
}

function downloadJson() {
    let finalFilters = {};
    queue.forEach(item => {
        const id = crypto.randomUUID();
        finalFilters[id] = {
            "enabled": true,
            "encounterFilterId": id,
            "encounterFilterName": `${item.name.toUpperCase()} Rank 1-${item.ivs.length} (${item.league})`,
            "filterLevel": true,
            "filterOnlyCatch": true,
            "filterPokemonId": true,
            "filterSpecificIv": true,
            "ivSets": item.ivs.map(iv => ({ "ivAtk": iv.a, "ivDef": iv.d, "ivSta": iv.s })),
            "levelMax": item.lvlMax,
            "levelMin": 1,
            "onlyShiny": item.isShiny,
            "removePokemonIdFromListThreshold": 1,
            "removePokemonIdFromListWhenCaught": true,
            "pokemonId": item.ids.map(dexId => ({ "pokedexId": dexId, "costume": 0, "form": 0, "gender": 0 }))
        };
    });

    const jsonStr = JSON.stringify({ "encounterFilters": finalFilters }, null, 2);
    document.getElementById('output').textContent = jsonStr;

    const blob = new Blob([jsonStr], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `PvP_Filters_${new Date().getTime()}.json`;
    a.click();
}

init();
</script>
</body>
</html>
